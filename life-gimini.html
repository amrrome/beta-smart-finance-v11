                                <h3 className="text-xl font-bold text-gray-800 mb-4">ملخص المقارنة المالية</h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                                    <div className="bg-white rounded-lg p-4 shadow border border-gray-200">
                                        <p className="text-sm text-gray-600 mb-1">فرق المقدم</p>
                                        <p className={`text-xl font-bold ${results.downPayment > baseSystemResults.downPayment ? 'text-green-600' : 'text-red-600'}`}>
                                            {formatCurrency(results.downPayment - baseSystemResults.downPayment)}
                                        </p>
                                        <p className="text-xs text-gray-500">مقدم خطتك - مقدم النظام الأساسي</p>
                                    </div>
                                    <div className="bg-white rounded-lg p-4 shadow border border-gray-200">
                                        <p className="text-sm text-gray-600 mb-1">فرق إجمالي المدفوعات</p>
                                        <p className={`text-xl font-bold ${results.summary.totalPaid < baseSystemResults.summary.totalPaid ? 'text-green-600' : 'text-red-600'}`}>
                                            {formatCurrency(results.summary.totalPaid - baseSystemResults.summary.totalPaid)}
                                        </p>
                                        <p className="text-xs text-gray-500">الإجمالي خطتك - الإجمالي الأساسي</p>
                                    </div>
                                    <div className="bg-white rounded-lg p-4 shadow border border-gray-200">
                                        <p className="text-sm text-gray-600 mb-1">فرق القيمة الحالية (PV)</p>
                                        <p className={`text-xl font-bold ${results.verification.totalPV > baseSystemResults.verification.totalPV ? 'text-green-600' : 'text-red-600'}`}>
                                            {formatCurrency(results.verification.totalPV - baseSystemResults.verification.totalPV)}
                                        </p>
                                        <p className="text-xs text-gray-500">القيمة الحالية خطتك - القيمة الحالية الأساسي</p>
                                    </div>
                                    <div className="bg-white rounded-lg p-4 shadow border border-gray-200">
                                        <p className="text-sm text-gray-600 mb-1">فرق الخصم</p>
                                        <p className={`text-xl font-bold ${results.summary.totalDiscount > baseSystemResults.summary.totalDiscount ? 'text-green-600' : 'text-red-600'}`}>
                                            {formatCurrency(results.summary.totalDiscount - baseSystemResults.summary.totalDiscount)}
                                        </p>
                                        <p className="text-xs text-gray-500">خصم خطتك - خصم النظام الأساسي</p>
                                    </div>
                                </div>

                                <h3 className="text-xl font-bold text-gray-800 mb-4">جدول مقارنة الدفعات</h3>
                                <div className="mobile-scroll">
                                    <table className="min-w-full comparison-table divide-y divide-gray-200">
                                        <thead className="bg-gray-50">
                                            <tr>
                                                <th className="py-3 px-6 text-right">م</th>
                                                <th className="py-3 px-6 text-right">التاريخ</th>
                                                <th className="py-3 px-6 text-right">النوع</th>
                                                <th className="py-3 px-6 text-right">دفعة خطتك</th>
                                                <th className="py-3 px-6 text-right">دفعة النظام الأساسي</th>
                                                <th className="py-3 px-6 text-right">فرق الدفعة</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-gray-700 text-sm font-light">
                                            {results.schedule.map((p, index) => {
                                                const basePayment = baseSystemResults.schedule.find(bp => bp.type === p.type && (p.type === 'مقدم' || bp.id === p.id) ) || null;
                                                let baseAmount = basePayment?.amount || 0;
                                                let diff = p.amount - baseAmount;
                                                let diffClass = diff > 0 ? 'text-red-600 font-bold' : (diff < 0 ? 'text-green-600 font-bold' : '');

                                                return (
                                                    <tr key={index} className="border-b border-gray-200 hover:bg-gray-50">
                                                        <td className="py-3 px-6 text-right whitespace-nowrap">{p.id}</td>
                                                        <td className="py-3 px-6 text-right whitespace-nowrap">{formatDate(p.date)}</td>
                                                        <td className="py-3 px-6 text-right whitespace-nowrap">{p.type}</td>
                                                        <td className="py-3 px-6 text-right font-bold text-red-800">{formatCurrency(p.amount)}</td>
                                                        <td className="py-3 px-6 text-right font-bold text-blue-800">{formatCurrency(baseAmount)}</td>
                                                        <td className={`py-3 px-6 text-right ${diffClass}`}>
                                                            {formatCurrency(diff)}
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                            {/* صف الإجمالي */}
                                            <tr className="bg-gray-200 font-bold text-base">
                                                <td className="py-3 px-6 text-right" colSpan="3">الإجمالي</td>
                                                <td className="py-3 px-6 text-right text-red-800">{formatCurrency(results.summary.totalPaid)}</td>
                                                <td className="py-3 px-6 text-right text-blue-800">{formatCurrency(baseSystemResults.summary.totalPaid)}</td>
                                                <td className={`py-3 px-6 text-right ${results.summary.totalPaid < baseSystemResults.summary.totalPaid ? 'text-green-600' : 'text-red-600'}`}>
                                                    {formatCurrency(results.summary.totalPaid - baseSystemResults.summary.totalPaid)}
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>

                                <div className="text-center mt-8">
                                    <button onClick={() => setShowComparison(false)} className="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg text-lg">
                                        إغلاق
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                )
            );


            // ═══ Main Render ═══
            return (
                <div className="min-h-screen p-4 sm:p-8 flex justify-center">
                    <div className="w-full max-w-7xl">
                        {/* Header */}
                        <header className="text-center mb-8 print-hidden">
                            <div className="flex justify-between items-center bg-white/10 rounded-xl p-4 shadow-xl">
                                <h1 className="text-3xl font-extrabold text-white">
                                    BETA SMART FINANCE PRO v2.0
                                </h1>
                                <div className="flex gap-4 items-center">
                                    {isAdmin ? (
                                        <button onClick={() => setShowProjectsManager(true)} className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm">
                                            ⚙️ إدارة المشاريع
                                        </button>
                                    ) : (
                                        <button onClick={() => setShowAdminPanel(true)} className="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg text-sm">
                                            دخول المدير
                                        </button>
                                    )}
                                </div>
                            </div>
                        </header>
                        
                        {/* Admin Login Panel */}
                        {showAdminPanel && !isAdmin && (
                            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 print-hidden">
                                <div className="glass-card p-8 rounded-xl shadow-2xl w-full max-w-md space-y-4">
                                    <h3 className="text-xl font-bold text-gray-800">تسجيل دخول المدير</h3>
                                    <input type="password" value={adminPassword} onChange={(e) => setAdminPassword(e.target.value)} placeholder="كلمة المرور" className="w-full px-4 py-3 border rounded-lg modern-input" />
                                    <button onClick={handleAdminLogin} className="btn-premium gradient-primary w-full text-white px-4 py-3 rounded-lg"> دخول </button>
                                </div>
                            </div>
                        )}

                        {/* Project Manager Modal */}
                        {showProjectsManager && isAdmin && <ProjectManagerModal />}
                        
                        {/* Base System Modal */}
                        <BaseSystemModal />

                        {/* Main Content Area */}
                        <div className="mt-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* Input Panel - Col 1 */}
                            <div className="lg:col-span-1 space-y-6 print-hidden">
                                {/* Project Selector */}
                                <div className="glass-card p-6 rounded-xl shadow-lg space-y-4">
                                    <h3 className="text-xl font-bold text-gray-800 mb-4">اختر المشروع</h3>
                                    <div className="grid grid-cols-1 gap-4">
                                        {projects.map(project => (
                                            <button 
                                                key={project.id} 
                                                onClick={() => setSelectedProjectId(project.id)} 
                                                className={`p-4 rounded-xl border-2 transition-all text-right ${
                                                    selectedProjectId === project.id 
                                                    ? 'border-red-600 bg-red-50 shadow-md' 
                                                    : 'bg-white border-gray-300 hover:border-red-400'
                                                }`}
                                            >
                                                <p className="font-bold text-lg text-gray-900">{project.name}</p>
                                                <p className="text-sm text-gray-600">{project.description}</p>
                                                <div className="flex justify-between text-xs mt-2 text-gray-500">
                                                    <span>خصم كاش: {project.cashDiscountRate}%</span>
                                                    <span>معدل خصم: {project.discountRate.toFixed(3)}%</span>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* General Input */}
                                <div className="glass-card p-6 rounded-xl shadow-lg space-y-4">
                                    <h3 className="text-xl font-bold text-gray-800 mb-4">بيانات الوحدة</h3>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">قيمة الوحدة الإجمالية (بالجنيه)</label>
                                        <input 
                                            type="number" 
                                            step="10000" 
                                            value={unitValue} 
                                            onChange={(e) => setUnitValue(parseFloat(e.target.value) || 0)} 
                                            className="w-full px-4 py-3 border rounded-lg modern-input text-lg font-bold text-red-700"
                                            min="100000"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">رقم الوحدة (اختياري)</label>
                                        <input 
                                            type="text" 
                                            value={unitNumber} 
                                            onChange={(e) => setUnitNumber(e.target.value)} 
                                            placeholder="أدخل رقم الوحدة"
                                            className="w-full px-4 py-3 border rounded-lg modern-input"
                                        />
                                    </div>
                                </div>

                                {/* Down Payment & Term */}
                                <div className="glass-card p-6 rounded-xl shadow-lg space-y-4">
                                    <h3 className="text-xl font-bold text-gray-800 mb-4">المقدم والمدة</h3>
                                    
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">قيمة المقدم</label>
                                        <div className="flex gap-2">
                                            <input 
                                                type="number" 
                                                step="1000" 
                                                value={downPaymentValue} 
                                                onChange={(e) => setDownPaymentValue(parseFloat(e.target.value) || 0)} 
                                                className="w-3/5 px-4 py-3 border rounded-lg modern-input" 
                                            />
                                            <select 
                                                value={downPaymentIsPercentage ? 'percentage' : 'value'} 
                                                onChange={(e) => setDownPaymentIsPercentage(e.target.value === 'percentage')} 
                                                className="w-2/5 px-4 py-3 border rounded-lg modern-input bg-white" 
                                            >
                                                <option value="percentage">نسبة %</option>
                                                <option value="value">قيمة ج</option>
                                            </select>
                                        </div>
                                        {getSelectedProject() && (
                                            <p className="text-xs text-red-500 mt-1">
                                                الحد الأدنى للمقدم: {getSelectedProject().minDownPaymentPercent}%
                                            </p>
                                        )}
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">تاريخ دفع المقدم (تاريخ أساس الحساب)</label>
                                        <input 
                                            type="date" 
                                            value={downPaymentDate} 
                                            onChange={(e) => setDownPaymentDate(e.target.value)} 
                                            className="w-full px-4 py-3 border rounded-lg modern-input bg-white" 
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">عدد سنوات التقسيط المتبقية</label>
                                        <input 
                                            type="number" 
                                            step="1" 
                                            min="1"
                                            max="15"
                                            value={numberOfYears} 
                                            onChange={(e) => setNumberOfYears(parseInt(e.target.value) || 1)} 
                                            className="w-full px-4 py-3 border rounded-lg modern-input" 
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">يوم استحقاق القسط (1 أو 15)</label>
                                        <select 
                                            value={installmentDay} 
                                            onChange={(e) => setInstallmentDay(parseInt(e.target.value))} 
                                            className="w-full px-4 py-3 border rounded-lg modern-input bg-white" 
                                        >
                                            <option value={1}>اليوم الأول من الشهر (1)</option>
                                            <option value={15}>منتصف الشهر (15)</option>
                                        </select>
                                    </div>

                                </div>
                            </div>

                            {/* Payment Options - Col 2 */}
                            <div className="lg:col-span-2 space-y-6 print-hidden">
                                {/* Pattern Selection */}
                                <div className="glass-card p-6 rounded-xl shadow-lg space-y-4">
                                    <h3 className="text-xl font-bold text-gray-800 mb-4">اختر نظام السداد</h3>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                        <button 
                                            onClick={() => setSelectedPattern('equal')} 
                                            className={`p-3 rounded-lg font-bold transition-all ${selectedPattern === 'equal' ? 'gradient-primary text-white shadow-lg' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                                        >
                                            القسط الموحد
                                        </button>
                                        <button 
                                            onClick={() => setSelectedPattern('decreasing')} 
                                            className={`p-3 rounded-lg font-bold transition-all ${selectedPattern === 'decreasing' ? 'gradient-primary text-white shadow-lg' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                                        >
                                            القسط المتناقص
                                        </button>
                                        <button 
                                            onClick={() => setSelectedPattern('graduated')} 
                                            className={`p-3 rounded-lg font-bold transition-all ${selectedPattern === 'graduated' ? 'gradient-primary text-white shadow-lg' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                                        >
                                            القسط المتزايد
                                        </button>
                                        <button 
                                            onClick={() => setSelectedPattern('custom')} 
                                            className={`p-3 rounded-lg font-bold transition-all ${selectedPattern === 'custom' ? 'gradient-primary text-white shadow-lg' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                                        >
                                            التوزيع المخصص <span className="badge badge-new">جديد</span>
                                        </button>
                                    </div>
                                    
                                    {/* Inputs for Equal/Decreasing/Graduated */}
                                    {(selectedPattern === 'equal' || selectedPattern === 'decreasing' || selectedPattern === 'graduated') && (
                                        <div className="mt-4 p-4 bg-gray-50 rounded-lg border border-gray-200 space-y-4">
                                            <h4 className="font-bold text-lg text-gray-800">إعدادات الأقساط</h4>
                                            
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-sm font-medium text-gray-700 mb-1">تردد القسط (سنوي / نصف سنوي / ربع سنوي)</label>
                                                    <select 
                                                        value={frequency} 
                                                        onChange={(e) => setFrequency(parseInt(e.target.value))} 
                                                        className="w-full px-4 py-3 border rounded-lg modern-input bg-white"
                                                        disabled={selectedPattern === 'custom'}
                                                    >
                                                        <option value={1}>سنوي (1)</option>
                                                        <option value={2}>نصف سنوي (2)</option>
                                                        <option value={4}>ربع سنوي (4)</option>
                                                        <option value={12}>شهري (12)</option>
                                                    </select>
                                                </div>
                                                
                                                {selectedPattern === 'decreasing' && (
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">نسبة التناقص السنوية (%)</label>
                                                        <input 
                                                            type="number" 
                                                            step="0.1"
                                                            value={decreaseRate} 
                                                            onChange={(e) => setDecreaseRate(parseFloat(e.target.value) || 0)} 
                                                            className="w-full px-4 py-3 border rounded-lg modern-input"
                                                        />
                                                    </div>
                                                )}

                                                {selectedPattern === 'graduated' && (
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">نسبة التزايد السنوية (%)</label>
                                                        <input 
                                                            type="number" 
                                                            step="0.1"
                                                            value={growthRate} 
                                                            onChange={(e) => setGrowthRate(parseFloat(e.target.value) || 0)} 
                                                            className="w-full px-4 py-3 border rounded-lg modern-input"
                                                        />
                                                    </div>
                                                )}
                                            </div>

                                            <h4 className="font-bold text-lg text-gray-800 mt-6">دفعات إضافية محددة</h4>
                                            
                                            {/* Annual Payments */}
                                            <div className="p-3 bg-green-100 rounded-lg border border-green-300">
                                                <div className="flex justify-between items-center mb-2">
                                                    <h4 className="font-bold text-md text-gray-800">دفعات سنوية إضافية</h4>
                                                    <button onClick={addAnnualPayment} className="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded-lg text-xs">
                                                        ➕ إضافة
                                                    </button>
                                                </div>
                                                {annualPayments.map(p => (
                                                    <div key={p.id} className="flex gap-2 items-center text-sm mt-2 bg-white p-2 rounded border">
                                                        <input type="text" value={p.type} onChange={(e) => updateAnnualPayment(p.id, 'type', e.target.value)} placeholder="اسم الدفعة" className="px-2 py-1 border rounded w-24" />
                                                        <input type="number" value={p.value} onChange={(e) => updateAnnualPayment(p.id, 'value', parseFloat(e.target.value))} placeholder="القيمة" className="px-2 py-1 border rounded w-20" />
                                                        <select value={p.isPercentage ? 'percentage' : 'value'} onChange={(e) => updateAnnualPayment(p.id, 'isPercentage', e.target.value === 'percentage')} className="px-2 py-1 border rounded bg-white w-20">
                                                            <option value="percentage">%</option>
                                                            <option value="value">ج</option>
                                                        </select>
                                                        <input type="date" value={p.date} onChange={(e) => updateAnnualPayment(p.id, 'date', e.target.value)} className="px-2 py-1 border rounded bg-white flex-1" />
                                                        <button onClick={() => deleteAnnualPayment(p.id)} className="text-red-600 hover:text-red-800 text-lg font-bold">×</button>
                                                    </div>
                                                ))}
                                            </div>

                                            {/* Semiannual Payments */}
                                            <div className="p-3 bg-yellow-100 rounded-lg border border-yellow-300">
                                                <div className="flex justify-between items-center mb-2">
                                                    <h4 className="font-bold text-md text-gray-800">دفعات نصف سنوية إضافية</h4>
                                                    <button onClick={addSemiannualPayment} className="bg-yellow-600 hover:bg-yellow-700 text-white px-3 py-1 rounded-lg text-xs">
                                                        ➕ إضافة
                                                    </button>
                                                </div>
                                                {semiannualPayments.map(p => (
                                                    <div key={p.id} className="flex gap-2 items-center text-sm mt-2 bg-white p-2 rounded border">
                                                        <input type="text" value={p.type} onChange={(e) => updateSemiannualPayment(p.id, 'type', e.target.value)} placeholder="اسم الدفعة" className="px-2 py-1 border rounded w-24" />
                                                        <input type="number" value={p.value} onChange={(e) => updateSemiannualPayment(p.id, 'value', parseFloat(e.target.value))} placeholder="القيمة" className="px-2 py-1 border rounded w-20" />
                                                        <select value={p.isPercentage ? 'percentage' : 'value'} onChange={(e) => updateSemiannualPayment(p.id, 'isPercentage', e.target.value === 'percentage')} className="px-2 py-1 border rounded bg-white w-20">
                                                            <option value="percentage">%</option>
                                                            <option value="value">ج</option>
                                                        </select>
                                                        <input type="date" value={p.date} onChange={(e) => updateSemiannualPayment(p.id, 'date', e.target.value)} className="px-2 py-1 border rounded bg-white flex-1" />
                                                        <button onClick={() => deleteSemiannualPayment(p.id)} className="text-red-600 hover:text-red-800 text-lg font-bold">×</button>
                                                    </div>
                                                ))}
                                            </div>

                                            {/* Quarterly Payments */}
                                            <div className="p-3 bg-red-100 rounded-lg border border-red-300">
                                                <div className="flex justify-between items-center mb-2">
                                                    <h4 className="font-bold text-md text-gray-800">دفعات ربع سنوية إضافية</h4>
                                                    <button onClick={addQuarterlyPayment} className="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded-lg text-xs">
                                                        ➕ إضافة
                                                    </button>
                                                </div>
                                                {quarterlyPayments.map(p => (
                                                    <div key={p.id} className="flex gap-2 items-center text-sm mt-2 bg-white p-2 rounded border">
                                                        <input type="text" value={p.type} onChange={(e) => updateQuarterlyPayment(p.id, 'type', e.target.value)} placeholder="اسم الدفعة" className="px-2 py-1 border rounded w-24" />
                                                        <input type="number" value={p.value} onChange={(e) => updateQuarterlyPayment(p.id, 'value', parseFloat(e.target.value))} placeholder="القيمة" className="px-2 py-1 border rounded w-20" />
                                                        <select value={p.isPercentage ? 'percentage' : 'value'} onChange={(e) => updateQuarterlyPayment(p.id, 'isPercentage', e.target.value === 'percentage')} className="px-2 py-1 border rounded bg-white w-20">
                                                            <option value="percentage">%</option>
                                                            <option value="value">ج</option>
                                                        </select>
                                                        <input type="date" value={p.date} onChange={(e) => updateQuarterlyPayment(p.id, 'date', e.target.value)} className="px-2 py-1 border rounded bg-white flex-1" />
                                                        <button onClick={() => deleteQuarterlyPayment(p.id)} className="text-red-600 hover:text-red-800 text-lg font-bold">×</button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Inputs for Custom Distribution */}
                                    {selectedPattern === 'custom' && (
                                        <div className="space-y-6">
                                            <div className="p-4 bg-amber-50 rounded-lg border-2 border-amber-200">
                                                <div className="flex items-center justify-between mb-4">
                                                    <h3 className="font-bold text-lg">دفعات مخصصة</h3>
                                                    <button onClick={addCustomPayment} className="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-lg text-sm">
                                                        ➕ إضافة دفعة
                                                    </button>
                                                </div>
                                                {customPayments.length > 0 && (
                                                    <div className="space-y-3">
                                                        {customPayments.map((payment) => (
                                                            <div key={payment.id} className="bg-white p-3 rounded-lg border border-amber-300">
                                                                <div className="grid grid-cols-1 md:grid-cols-6 gap-3">
                                                                    <input type="text" value={payment.type} onChange={(e) => updateCustomPayment(payment.id, 'type', e.target.value)} placeholder="اسم" className="px-3 py-2 border rounded" />
                                                                    <div className="flex gap-2">
                                                                        <input type="number" value={payment.value} onChange={(e) => updateCustomPayment(payment.id, 'value', parseFloat(e.target.value))} placeholder="القيمة" className="flex-1 px-3 py-2 border rounded" />
                                                                        <select value={payment.isPercentage ? 'percentage' : 'value'} onChange={(e) => updateCustomPayment(payment.id, 'isPercentage', e.target.value === 'percentage')} className="px-3 py-2 border rounded bg-white w-20">
                                                                            <option value="percentage">%</option>
                                                                            <option value="value">ج</option>
                                                                        </select>
                                                                    </div>
                                                                    <select value={payment.frequency} onChange={(e) => updateCustomPayment(payment.id, 'frequency', e.target.value)} className="px-3 py-2 border rounded bg-white">
                                                                        <option value="once">مرة واحدة</option>
                                                                        <option value="annual">سنوي</option>
                                                                        <option value="semiannual">نصف سنوي</option>
                                                                        <option value="quarterly">ربع سنوي</option>
                                                                    </select>
                                                                    {payment.frequency !== 'once' && (
                                                                        <input type="number" value={payment.numberOfPayments} onChange={(e) => updateCustomPayment(payment.id, 'numberOfPayments', parseInt(e.target.value))} placeholder="عدد الدفعات" className="px-3 py-2 border rounded" />
                                                                    )}
                                                                    <input type="date" value={payment.startDate} onChange={(e) => updateCustomPayment(payment.id, 'startDate', e.target.value)} className="px-3 py-2 border rounded bg-white" />
                                                                    <button onClick={() => deleteCustomPayment(payment.id)} className="text-red-600 hover:text-red-800 text-xl font-bold">×</button>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                            
                                            <div className="p-4 bg-blue-50 rounded-lg border-2 border-blue-200">
                                                <h3 className="font-bold text-lg mb-4">الأقساط الربع سنوية المتبقية (لتغطية الباقي)</h3>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">عدد سنوات تقسيط المتبقي</label>
                                                        <input 
                                                            type="number" 
                                                            step="1" 
                                                            min="0"
                                                            max="15"
                                                            value={customQuarterlyYears} 
                                                            onChange={(e) => setCustomQuarterlyYears(parseInt(e.target.value) || 0)} 
                                                            className="w-full px-4 py-3 border rounded-lg modern-input" 
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-700 mb-1">تاريخ بدء أول قسط ربع سنوي (اختياري)</label>
                                                        <input 
                                                            type="date" 
                                                            value={customQuarterlyStartDate} 
                                                            onChange={(e) => setCustomQuarterlyStartDate(e.target.value)} 
                                                            className="w-full px-4 py-3 border rounded-lg modern-input bg-white" 
                                                        />
                                                        <p className="text-xs text-gray-500 mt-1">يترك فارغاً للبدء بعد 3 أشهر من تاريخ المقدم</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Admin Rounding Option */}
                                    {isAdmin && (
                                        <div className="bg-gradient-to-r from-amber-50 to-orange-50 rounded-xl p-4 border-2 border-amber-200 mt-6">
                                            <label className="block text-sm font-bold text-gray-700 mb-3">
                                                <span className="flex items-center gap-2">
                                                    <span>🎯</span> إعدادات تقريب القسط (للمدير)
                                                </span>
                                            </label>
                                            <div className="mb-3 p-2 bg-green-100 rounded-lg border border-green-300">
                                                <p className="text-green-700 text-sm">
                                                    ✅ <strong>تلقائي:</strong> يتم تقريب جميع الأقساط للأعلى لأقرب 100 ج تلقائياً
                                                </p>
                                            </div>
                                            <p className="text-sm text-gray-600 mb-2">تقريب إضافي (اختياري):</p>
                                            <div className="flex flex-wrap gap-3">
                                                <label className={`flex items-center gap-2 px-4 py-2 rounded-lg cursor-pointer transition-all ${roundingOption === 'none' ? 'bg-amber-500 text-white' : 'bg-white border-2 border-gray-300 hover:border-amber-400'}`}>
                                                    <input type="radio" name="rounding" value="none" checked={roundingOption === 'none'} onChange={(e) => setRoundingOption(e.target.value)} className="hidden" />
                                                    <span className="font-bold">بلا تقريب إضافي</span>
                                                </label>
                                                <label className={`flex items-center gap-2 px-4 py-2 rounded-lg cursor-pointer transition-all ${roundingOption === '500' ? 'bg-amber-500 text-white' : 'bg-white border-2 border-gray-300 hover:border-amber-400'}`}>
                                                    <input type="radio" name="rounding" value="500" checked={roundingOption === '500'} onChange={(e) => setRoundingOption(e.target.value)} className="hidden" />
                                                    <span className="font-bold">لأقرب 500 ج</span>
                                                </label>
                                                <label className={`flex items-center gap-2 px-4 py-2 rounded-lg cursor-pointer transition-all ${roundingOption === '1000' ? 'bg-amber-500 text-white' : 'bg-white border-2 border-gray-300 hover:border-amber-400'}`}>
                                                    <input type="radio" name="rounding" value="1000" checked={roundingOption === '1000'} onChange={(e) => setRoundingOption(e.target.value)} className="hidden" />
                                                    <span className="font-bold">لأقرب 1000 ج</span>
                                                </label>
                                                {/* Hidden option for default auto rounding of 100 */}
                                                <label className="hidden">
                                                    <input type="radio" name="rounding" value="100" checked={roundingOption === '100'} onChange={(e) => setRoundingOption(e.target.value)} />
                                                </label>
                                            </div>
                                        </div>
                                    )}

                                    {/* Calculate Button */}
                                    <button 
                                        onClick={calculate} 
                                        className="btn-premium gradient-primary w-full text-white px-6 py-4 rounded-xl text-xl font-bold mt-6 flex items-center justify-center gap-3 shadow-2xl"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-6 h-6">
                                            <path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                                        </svg>
                                        تنفيذ خطة السداد
                                    </button>
                                </div>
                            </div>
                            
                            {/* Results Panel - Col 3 (Spanning 2 if on mobile/tablet) */}
                            <div id="print-area" className={`lg:col-span-3 ${results ? 'block animate-fade-in' : 'hidden'}`}>
                                {results && (
                                    <div className="glass-card p-6 sm:p-8 rounded-xl shadow-2xl print-container">
                                        <div className="flex justify-between mb-4 print-hidden">
                                            <div>
                                                <h2 className="text-2xl font-bold text-gray-800">✅ خطة السداد - {results.patternName}</h2>
                                                <p className="text-sm text-gray-600 mt-1">القيمة الكاش للوحدة: {formatCurrency(results.verification.cashValue)} | معدل الخصم المعتمد: {getSelectedProject()?.discountRate.toFixed(3)}%</p>
                                            </div>
                                            <div className="flex gap-3">
                                                {baseSystemResults && (
                                                    <button onClick={() => setShowComparison(true)} className="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg">
                                                        📊 مقارنة متقدمة
                                                    </button>
                                                )}
                                                <button onClick={handlePrint} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg flex items-center gap-2">
                                                    🖨️ طباعة
                                                </button>
                                            </div>
                                        </div>
                                        
                                        <div className="print-only">
                                            <div className="text-center pb-6 mb-6" style={{borderBottom: '4px solid #DC143C'}}>
                                                <h1 style={{color: '#DC143C', fontSize: '28px', fontWeight: '800', marginBottom: '8px'}}> شركة بيتا للتطوير العقاري </h1>
                                                <p style={{color: '#2d2d2d', fontSize: '16px', fontWeight: '600', marginBottom: '5px'}}> BETA SMART FINANCE | نظام التقسيط المرن </p>
                                                <p style={{color: '#666', fontSize: '12px'}}> التاريخ: {new Date().toLocaleDateString('ar-EG')} </p>
                                            </div>
                                            <h2 className="text-2xl font-bold text-gray-800 text-center mb-4">خطة سداد الوحدة - {getSelectedProject()?.name}</h2>
                                            <div className="grid grid-cols-2 gap-4 text-lg border-b pb-4">
                                                <div><span className="font-bold">المشروع:</span> {getSelectedProject()?.name}</div>
                                                <div><span className="font-bold">نظام السداد:</span> {results.patternName}</div>
                                                <div><span className="font-bold">قيمة الوحدة:</span> {formatCurrency(unitValue)}</div>
                                                <div><span className="font-bold">القيمة الكاش:</span> {formatCurrency(results.verification.cashValue)}</div>
                                            </div>
                                        </div>

                                        {/* Summary Cards */}
                                        <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                                            <div className="bg-white rounded-lg p-4 shadow border border-gray-200">
                                                <p className="text-sm text-gray-600 mb-1">إجمالي المدفوعات</p>
                                                <p className="text-xl font-bold text-red-600">{formatCurrency(results.summary.totalPaid)}</p>
                                            </div>
                                            <div className="bg-white rounded-lg p-4 shadow border border-gray-200">
                                                <p className="text-sm text-gray-600 mb-1">إجمالي الخصم</p>
                                                <p className="text-xl font-bold text-green-600">{formatCurrency(results.summary.totalDiscount)}</p>
                                            </div>
                                            <div className="bg-white rounded-lg p-4 shadow border border-gray-200">
                                                <p className="text-sm text-gray-600 mb-1">القيمة الحالية (PV)</p>
                                                <p className="text-xl font-bold text-blue-600">{formatCurrency(results.verification.totalPV)}</p>
                                            </div>
                                            <div className="bg-white rounded-lg p-4 shadow border border-gray-200">
                                                <p className="text-sm text-gray-600 mb-1">إجمالي عدد الأقساط/الدفعات</p>
                                                <p className="text-xl font-bold text-gray-800">{results.summary.totalInstallmentsCount}</p>
                                            </div>
                                            <div className="bg-white rounded-lg p-4 shadow border border-gray-200">
                                                <p className="text-sm text-gray-600 mb-1">خطأ التحقق (%)</p>
                                                <p className={`text-xl font-bold ${Math.abs(results.verification.percentageError) > 0.1 ? 'text-red-700' : 'text-green-700'}`}>{results.verification.percentageError.toFixed(3)}%</p>
                                            </div>
                                        </div>

                                        {/* Installment Table */}
                                        <h3 className="text-xl font-bold text-gray-800 mb-4">جدول السداد</h3>
                                        <div className="mobile-scroll">
                                            <table className="min-w-full divide-y divide-gray-200">
                                                <thead className="bg-gray-50">
                                                    <tr>
                                                        <th className="py-3 px-6 text-right">م</th>
                                                        <th className="py-3 px-6 text-right">التاريخ</th>
                                                        <th className="py-3 px-6 text-right">النوع</th>
                                                        <th className="py-3 px-6 text-right">المبلغ</th>
                                                        {isAdmin && <th className="py-3 px-6 text-right border-b border-gray-200 print-hidden">القيمة الحالية (PV)</th>}
                                                        {isAdmin && <th className="py-3 px-6 text-right border-b border-gray-200 print-hidden">الخصم</th>}
                                                    </tr>
                                                </thead>
                                                <tbody className="text-gray-700 text-sm font-light">
                                                    {results.schedule.map((p, index) => (
                                                        <tr key={index} className={`border-b border-gray-200 hover:bg-gray-50 ${p.type === 'مقدم' ? 'bg-blue-50 font-bold' : ''}`}>
                                                            <td className="py-3 px-6 text-right whitespace-nowrap">{p.id}</td>
                                                            <td className="py-3 px-6 text-right whitespace-nowrap">{formatDate(p.date)}</td>
                                                            <td className="py-3 px-6 text-right whitespace-nowrap">{p.type}</td>
                                                            <td className="py-3 px-6 text-right whitespace-nowrap font-bold text-lg">{formatCurrency(p.amount)}</td>
                                                            {isAdmin && <td className="py-3 px-6 text-right whitespace-nowrap print-hidden">{formatCurrency(p.pv)}</td>}
                                                            {isAdmin && <td className="py-3 px-6 text-right whitespace-nowrap print-hidden">{formatCurrency(p.discount)}</td>}
                                                        </tr>
                                                    ))}
                                                    <tr className="bg-gray-200 font-bold text-base">
                                                        <td className="py-3 px-6 text-right" colSpan="3">الإجمالي</td>
                                                        <td className="py-3 px-6 text-right text-red-800">{formatCurrency(results.summary.totalPaid)}</td>
                                                        {isAdmin && <td className="py-3 px-6 text-right print-hidden">{formatCurrency(results.summary.totalPV)}</td>}
                                                        {isAdmin && <td className="py-3 px-6 text-right text-green-800 print-hidden">{formatCurrency(results.summary.totalDiscount)}</td>}
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>

                                        {/* Financial Insight */}
                                        <h3 className="text-xl font-bold text-gray-800 mt-8 mb-4">تحليل مالي</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="bg-gray-50 p-4 rounded-lg border border-gray-200 space-y-3">
                                                <div>
                                                    <p className="text-gray-600">نسبة المقدم من القيمة الكاش</p>
                                                    <p className="font-bold text-blue-700">{((results.summary.totalDownPayment / results.verification.cashValue) * 100).toFixed(2)}%</p>
                                                </div>
                                                <div>
                                                    <p className="text-gray-600">القسط الموحد (أول قسط)</p>
                                                    <p className="font-bold text-green-700">
                                                        {results.pattern === 'equal' 
                                                            ? formatCurrency(results.installmentAmount) 
                                                            : results.pattern === 'decreasing' 
                                                            ? formatCurrency(results.baseInstallment)
                                                            : results.pattern === 'graduated'
                                                            ? formatCurrency(results.baseInstallment)
                                                            : 'غير متوفر'}
                                                    </p>
                                                </div>
                                            </div>
                                            <div className="bg-gray-50 p-4 rounded-lg border border-gray-200 space-y-3">
                                                <div>
                                                    <p className="text-gray-600">فرق التقسيط عن الكاش (إجمالي الفائدة)</p>
                                                    <p className="font-bold text-orange-700">{formatCurrency(results.summary.totalPaid - results.verification.cashValue)}</p>
                                                </div>
                                                <div>
                                                    <p className="text-gray-600">نسبة الزيادة الكلية</p>
                                                    <p className="font-bold text-orange-700">
                                                        {((results.summary.totalPaid / results.verification.cashValue - 1) * 100).toFixed(2)}%
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Enhanced Comparison Modal */}
                        <ComparisonModal />

                        {/* Footer */}
                        <div className="text-center text-gray-600 text-sm mt-8 pb-8 print-hidden">
                            <p className="font-bold text-red-600 text-lg">شركة بيتا للتطوير العقاري</p>
                            <p className="mt-1">BETA SMART FINANCE | نظام التقسيط المرن - دقة عالية - خدمة متميزة</p>
                            <p className="mt-2">© 2025 جميع الحقوق محفوظة</p>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<BetaSmartFinance />, document.getElementById('root'));
    </script>
</body>
</html>
